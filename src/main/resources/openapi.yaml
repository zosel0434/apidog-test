openapi: 3.0.3
info:
  title: Spring Domain Filter Practice API
  version: 0.0.1-SNAPSHOT

paths:
  /api/orders:
    get:
      summary: 주문 목록 조회
      operationId: getOrders
      parameters:
        - name: orderNumber
          in: query
          required: false
          schema:
            type: string
        - name: orderStatus
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: userSearchRequest
          in: query
          required: false
          style: deepObject
          explode: true
          schema:
            $ref: '#/components/schemas/UserSearchRequest'
      responses:
        '200':
          description: 주문 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'

components:
  schemas:
    OrderStatus:
      type: string
      enum:
        - PENDING
        - CANCELED

    UserStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE

    UserSearchRequest:
      type: object
      properties:
        name:
          type: string
        userStatus:
          $ref: '#/components/schemas/UserStatus'

    OrderResponse:
      type: object
      properties:
        orderNumber:
          type: string
        orderStatus:
          $ref: '#/components/schemas/OrderStatus'
