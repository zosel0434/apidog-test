openapi: 3.1.0
info:
  title: Spring Domain Filter Practice API
  version: 0.0.1-SNAPSHOT

paths:
  /api/orders:
    get:
      summary: 주문 목록 조회
      operationId: getOrders
      parameters:
        - name: orderNumber
          in: query
          required: false
          schema:
            type: string
        - name: orderStatus
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: userSearchRequest
          in: query
          required: false
          style: deepObject
          explode: true
          schema:
            $ref: '#/components/schemas/UserSearchRequest'
      responses:
        '200':
          description: 주문 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'

components:
  schemas:
    OrderStatus:
      oneOf:
        - const: PENDING
          description: 대기
        - const: CANCELED
          description: 취소

    UserStatus:
      oneOf:
        - const: ACTIVE
          description: 활성화
        - const: INACTIVE
          description: 비활성화

    UserSearchRequest:
      type: object
      properties:
        name:
          type: string
        userStatus:
          $ref: '#/components/schemas/UserStatus'

    OrderResponse:
      type: object
      properties:
        orderNumber:
          type: string
        orderStatus:
          $ref: '#/components/schemas/OrderStatus'
